<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Familiares</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0e0e11;
  --bg2: #16161a;
  --bg3: #1e1e24;
  --bg4: #26262e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f2;
  --text2: #8b8b99;
  --text3: #55555f;
  --green: #22c87a;
  --green-dim: rgba(34,200,122,0.12);
  --red: #ff5f57;
  --red-dim: rgba(255,95,87,0.12);
  --blue: #4f9eff;
  --blue-dim: rgba(79,158,255,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --amber: #f59e0b;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; min-height: 100vh; }
.app { max-width: 800px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
h1::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

.month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
.month-nav span { font-size: 15px; font-weight: 500; flex: 1; text-align: center; color: var(--text); }

.metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1.25rem; }
@media(min-width:500px){ .metrics { grid-template-columns: repeat(4, 1fr); } }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

.tabs { display: flex; gap: 2px; margin-bottom: 1.25rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; overflow-x: auto; }
.tab { padding: 7px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text2); border-radius: var(--radius-sm); white-space: nowrap; font-weight: 500; transition: all 0.15s; }
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active { color: var(--text); background: var(--bg4); }
.section { display: none; }
.section.active { display: block; }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }

.form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
.form-row.three { grid-template-columns: repeat(3, 1fr); }
@media(max-width:480px){ .form-row.three { grid-template-columns: repeat(2, 1fr); } }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
input, select {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--bg3);
  color: var(--text);
  appearance: none;
}
input::placeholder { color: var(--text3); }
input:focus, select:focus { outline: none; border-color: var(--blue); background: var(--bg4); }
select option { background: #1e1e24; }

.btn { padding: 9px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.btn:hover { background: var(--bg4); }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #3a8ff0; border-color: #3a8ff0; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: var(--red); border-color: transparent; background: transparent; }
.btn-danger:hover { background: var(--red-dim); }

.type-toggle { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; }
.type-btn { flex: 1; padding: 8px; border-radius: 6px; border: none; background: none; color: var(--text2); font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; text-align: center; }
.type-btn.active-income { background: var(--green-dim); color: var(--green); }
.type-btn.active-expense { background: var(--red-dim); color: var(--red); }

.tx-list { display: flex; flex-direction: column; gap: 4px; }
.tx-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg3); border-radius: var(--radius-sm); border: 1px solid var(--border); transition: border-color 0.15s; }
.tx-item:hover { border-color: var(--border2); }
.tx-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.tx-meta { font-size: 11px; color: var(--text3); margin-top: 3px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.tx-amount { font-size: 14px; font-weight: 600; flex-shrink: 0; letter-spacing: -0.3px; }
.tx-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
.tx-del:hover { color: var(--red); background: var(--red-dim); }

.empty { text-align: center; color: var(--text3); font-size: 14px; padding: 2.5rem; }

.bar-wrap { margin-bottom: 14px; }
.bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: var(--text); }
.bar-label span:last-child { color: var(--text2); font-size: 12px; }
.bar-bg { background: var(--bg4); border-radius: 4px; height: 6px; overflow: hidden; }
.bar-fill { height: 6px; border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.badge-fijo { background: var(--blue-dim); color: var(--blue); }
.badge-variable { background: rgba(245,158,11,0.12); color: var(--amber); }
.member-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--purple-dim); color: var(--purple); font-weight: 600; }

.goal-item { margin-bottom: 18px; }
.goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.goal-name { font-size: 14px; font-weight: 500; color: var(--text); }

.chart-wrap { position: relative; width: 100%; height: 220px; }

.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--bg4); color: var(--text); border: 1px solid var(--border2); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <h1>Finanzas Familiares</h1>

  <div class="month-nav">
    <button class="btn btn-sm" id="prev-month">←</button>
    <span id="month-label"></span>
    <button class="btn btn-sm" id="next-month">→</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Ingresos</div><div class="metric-value" id="m-income" style="color:#22c87a">$0</div></div>
    <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value" id="m-expense" style="color:#ff5f57">$0</div></div>
    <div class="metric"><div class="metric-label">Ahorro</div><div class="metric-value" id="m-saving">$0</div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-value" id="m-balance">$0</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="registrar">Registrar</button>
    <button class="tab" data-tab="movimientos">Movimientos</button>
    <button class="tab" data-tab="resumen">Resumen</button>
    <button class="tab" data-tab="metas">Metas</button>
  </div>

  <div id="tab-registrar" class="section active">
    <div class="card">
      <div class="type-toggle">
        <button class="type-btn active-income" id="btn-ingreso" onclick="setType('ingreso')">+ Ingreso</button>
        <button class="type-btn" id="btn-gasto" onclick="setType('gasto')">− Gasto</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Descripción</label><input type="text" id="f-desc" placeholder="ej. Supermercado"></div>
        <div class="form-group"><label>Monto ($)</label><input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01"></div>
      </div>
      <div class="form-row three" id="gasto-fields">
        <div class="form-group"><label>Categoría</label>
          <select id="f-cat">
            <option>Alimentación</option><option>Transporte</option><option>Vivienda</option>
            <option>Salud</option><option>Educación</option><option>Entretenimiento</option>
            <option>Ropa</option><option>Servicios</option><option>Ahorro</option><option>Otro</option>
          </select>
        </div>
        <div class="form-group"><label>Tipo</label>
          <select id="f-kind"><option value="fijo">Fijo</option><option value="variable">Variable</option></select>
        </div>
        <div class="form-group"><label>Persona</label>
          <select id="f-member"><option>Hugo</option><option>Romi</option><option>Compartido</option></select>
        </div>
      </div>
      <div class="form-row" id="ingreso-fields" style="display:none">
        <div class="form-group"><label>Fuente</label>
          <select id="f-source"><option>Sueldo</option><option>Freelance</option><option>Negocio</option><option>Inversión</option><option>Otro</option></select>
        </div>
        <div class="form-group"><label>Persona</label>
          <select id="f-member2"><option>Hugo</option><option>Romi</option></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addTransaction()" style="width:100%;margin-top:10px" id="save-btn">Guardar</button>
    </div>
  </div>

  <div id="tab-movimientos" class="section">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span class="card-title" style="margin:0">Movimientos del mes</span>
        <select id="filter-cat" style="width:auto;font-size:12px" onchange="renderTransactions()">
          <option value="">Todas</option>
          <option>Alimentación</option><option>Transporte</option><option>Vivienda</option>
          <option>Salud</option><option>Educación</option><option>Entretenimiento</option>
          <option>Ropa</option><option>Servicios</option><option>Ahorro</option><option>Otro</option>
          <option>Sueldo</option><option>Freelance</option><option>Negocio</option><option>Inversión</option>
        </select>
      </div>
      <div class="tx-list" id="tx-list"><div class="empty">Cargando...</div></div>
    </div>
  </div>

  <div id="tab-resumen" class="section">
    <div class="card"><div class="card-title">Por categoría</div><div id="cat-bars"></div></div>
    <div class="card"><div class="card-title">Fijos vs variables</div><div id="kind-bars"></div></div>
    <div class="card"><div class="card-title">Por persona</div><div id="member-bars"></div></div>
    <div class="card"><div class="card-title">Últimos 6 meses</div><div class="chart-wrap"><canvas id="trend-chart"></canvas></div></div>
  </div>

  <div id="tab-metas" class="section">
    <div class="card">
      <div class="card-title">Nueva meta</div>
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input type="text" id="g-name" placeholder="ej. Vacaciones"></div>
        <div class="form-group"><label>Objetivo ($)</label><input type="number" id="g-target" placeholder="0"></div>
      </div>
      <button class="btn btn-primary" onclick="addGoal()" style="width:100%;margin-top:4px">Agregar meta</button>
    </div>
    <div class="card"><div class="card-title">Mis metas</div><div id="goal-list"><div class="empty">Cargando...</div></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://edjnpvovfrbdcehkwaxb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3zI-3xmwszophr2b5XfzkQ_yJOc5D66';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentType = 'ingreso';
let viewDate = new Date();
let allTransactions = [];
let allGoals = [];
let trendChart = null;

const COLORS = {
  'Alimentación':'#22c87a','Transporte':'#4f9eff','Vivienda':'#a78bfa',
  'Salud':'#ff5f57','Educación':'#4f9eff','Entretenimiento':'#f59e0b',
  'Ropa':'#f472b6','Servicios':'#6b7280','Ahorro':'#22c87a','Otro':'#6b7280',
  'Sueldo':'#22c87a','Freelance':'#22c87a','Negocio':'#a78bfa','Inversión':'#4f9eff'
};

function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function fmt(n) { return '$' + Number(n).toLocaleString('es-EC', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function updateMonthLabel() {
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('month-label').textContent = `${months[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-ingreso').className = 'type-btn' + (t==='ingreso' ? ' active-income' : '');
  document.getElementById('btn-gasto').className = 'type-btn' + (t==='gasto' ? ' active-expense' : '');
  document.getElementById('gasto-fields').style.display = t==='gasto' ? 'grid' : 'none';
  document.getElementById('ingreso-fields').style.display = t==='ingreso' ? 'grid' : 'none';
}

async function loadAll() {
  const [{ data: txs }, { data: goals }] = await Promise.all([
    db.from('transactions').select('*').order('created_at', { ascending: false }),
    db.from('goals').select('*').order('created_at', { ascending: true })
  ]);
  allTransactions = txs || [];
  allGoals = goals || [];
  renderAll();
}

function currentMonthTxs() { return allTransactions.filter(t => t.month === monthKey(viewDate)); }

function renderMetrics() {
  const txs = currentMonthTxs();
  const income = txs.filter(t=>t.type==='ingreso').reduce((s,t)=>s+Number(t.amount),0);
  const expense = txs.filter(t=>t.type==='gasto').reduce((s,t)=>s+Number(t.amount),0);
  const saving = income - expense;
  document.getElementById('m-income').textContent = fmt(income);
  document.getElementById('m-expense').textContent = fmt(expense);
  document.getElementById('m-saving').textContent = fmt(saving);
  document.getElementById('m-balance').textContent = fmt(saving);
  document.getElementById('m-saving').style.color = saving >= 0 ? '#22c87a' : '#ff5f57';
  document.getElementById('m-balance').style.color = saving >= 0 ? '#22c87a' : '#ff5f57';
}

function renderTransactions() {
  const filterCat = document.getElementById('filter-cat').value;
  let txs = currentMonthTxs();
  if (filterCat) txs = txs.filter(t => t.cat === filterCat);
  const el = document.getElementById('tx-list');
  if (!txs.length) { el.innerHTML = '<div class="empty">Sin movimientos este mes</div>'; return; }
  el.innerHTML = txs.map(t => `
    <div class="tx-item">
      <div class="tx-dot" style="background:${t.type==='ingreso'?'#22c87a':'#ff5f57'}"></div>
      <div class="tx-info">
        <div class="tx-desc">${t.descripcion}</div>
        <div class="tx-meta">
          <span>${t.cat}</span>
          ${t.kind ? `<span class="badge badge-${t.kind}">${t.kind}</span>` : ''}
          <span class="member-tag">${t.member}</span>
        </div>
      </div>
      <div class="tx-amount" style="color:${t.type==='ingreso'?'#22c87a':'#ff5f57'}">${t.type==='ingreso'?'+':'−'}${fmt(t.amount)}</div>
      <button class="tx-del" onclick="deleteTransaction(${t.id})">×</button>
    </div>`).join('');
}

function renderBar(label, value, max, color) {
  const pct = max > 0 ? Math.min(100, Math.round(value/max*100)) : 0;
  return `<div class="bar-wrap">
    <div class="bar-label"><span>${label}</span><span>${fmt(value)} <span style="font-size:11px;opacity:.5">${pct}%</span></span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function renderResumen() {
  const txs = currentMonthTxs().filter(t => t.type==='gasto');
  const total = txs.reduce((s,t)=>s+Number(t.amount),0);
  const bycat = {};
  txs.forEach(t => { bycat[t.cat] = (bycat[t.cat]||0) + Number(t.amount); });
  const catEl = document.getElementById('cat-bars');
  catEl.innerHTML = Object.keys(bycat).length
    ? Object.entries(bycat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>renderBar(c,v,total,COLORS[c]||'#6b7280')).join('')
    : '<div class="empty">Sin gastos este mes</div>';
  const fijo = txs.filter(t=>t.kind==='fijo').reduce((s,t)=>s+Number(t.amount),0);
  const variable = txs.filter(t=>t.kind==='variable').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('kind-bars').innerHTML = renderBar('Fijos',fijo,total,'#4f9eff') + renderBar('Variables',variable,total,'#f59e0b');
  const byMember = {};
  txs.forEach(t => { byMember[t.member] = (byMember[t.member]||0) + Number(t.amount); });
  const mEl = document.getElementById('member-bars');
  mEl.innerHTML = Object.keys(byMember).length
    ? Object.entries(byMember).sort((a,b)=>b[1]-a[1]).map(([m,v])=>renderBar(m,v,total,'#a78bfa')).join('')
    : '<div class="empty">Sin gastos este mes</div>';
  renderTrend();
}

function renderTrend() {
  const labels=[], incomes=[], expenses=[];
  for (let i=5; i>=0; i--) {
    const d = new Date(viewDate.getFullYear(), viewDate.getMonth()-i, 1);
    const key = monthKey(d);
    const txs = allTransactions.filter(t=>t.month===key);
    labels.push(['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]);
    incomes.push(txs.filter(t=>t.type==='ingreso').reduce((s,t)=>s+Number(t.amount),0));
    expenses.push(txs.filter(t=>t.type==='gasto').reduce((s,t)=>s+Number(t.amount),0));
  }
  if (trendChart) { trendChart.destroy(); trendChart=null; }
  trendChart = new Chart(document.getElementById('trend-chart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'Ingresos', data:incomes, backgroundColor:'rgba(34,200,122,0.7)', borderRadius:5 },
      { label:'Gastos', data:expenses, backgroundColor:'rgba(255,95,87,0.65)', borderRadius:5 }
    ]},
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ autoSkip:false, color:'#55555f', font:{size:12} }, grid:{ color:'rgba(255,255,255,0.04)' } },
        y:{ ticks:{ callback: v=>'$'+v.toLocaleString(), color:'#55555f', font:{size:12} }, grid:{ color:'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function renderGoals() {
  const el = document.getElementById('goal-list');
  if (!allGoals.length) { el.innerHTML='<div class="empty">Sin metas todavía</div>'; return; }
  el.innerHTML = allGoals.map(g => {
    const pct = Math.min(100, Math.round(g.saved/g.target*100));
    const color = pct>=100?'#22c87a':pct>=50?'#4f9eff':'#f59e0b';
    return `<div class="goal-item">
      <div class="goal-header">
        <span class="goal-name">${g.name}</span>
        <span style="display:flex;gap:6px;align-items:center">
          <span style="font-size:12px;color:#8b8b99">${fmt(g.saved)} / ${fmt(g.target)}</span>
          <button class="btn btn-sm" onclick="addToGoal(${g.id})">+ Abonar</button>
          <button class="btn btn-sm btn-danger" onclick="deleteGoal(${g.id})">×</button>
        </span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div style="font-size:11px;color:#55555f;margin-top:5px">${pct}% completado</div>
    </div>`;
  }).join('');
}

function renderAll() { renderMetrics(); renderTransactions(); renderResumen(); renderGoals(); }

async function addTransaction() {
  const descripcion = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!descripcion || !amount || amount<=0) { toast('Completa descripción y monto'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';
  const tx = {
    type: currentType, descripcion, amount,
    month: monthKey(viewDate),
    date: new Date().toLocaleDateString('es-EC'),
    cat: currentType==='gasto' ? document.getElementById('f-cat').value : document.getElementById('f-source').value,
    kind: currentType==='gasto' ? document.getElementById('f-kind').value : null,
    member: currentType==='gasto' ? document.getElementById('f-member').value : document.getElementById('f-member2').value
  };
  const { data, error } = await db.from('transactions').insert([tx]).select();
  if (error) { toast('Error al guardar'); }
  else {
    allTransactions.unshift(data[0]);
    document.getElementById('f-desc').value = '';
    document.getElementById('f-amount').value = '';
    toast('Guardado');
    renderAll();
  }
  btn.disabled = false; btn.textContent = 'Guardar';
}

async function deleteTransaction(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  await db.from('transactions').delete().eq('id', id);
  allTransactions = allTransactions.filter(t=>t.id!==id);
  renderAll();
}

async function addGoal() {
  const name = document.getElementById('g-name').value.trim();
  const target = parseFloat(document.getElementById('g-target').value);
  if (!name || !target || target<=0) { toast('Completa nombre y monto'); return; }
  const { data, error } = await db.from('goals').insert([{ name, target, saved:0 }]).select();
  if (!error) {
    allGoals.push(data[0]);
    document.getElementById('g-name').value='';
    document.getElementById('g-target').value='';
    toast('Meta creada');
    renderGoals();
  }
}

async function addToGoal(id) {
  const abonoStr = prompt('¿Cuánto quieres abonar?');
  const abono = parseFloat(abonoStr);
  if (!abono || abono<=0) return;
  const g = allGoals.find(g=>g.id===id);
  const newSaved = Math.min(g.target, g.saved + abono);
  const { error } = await db.from('goals').update({ saved: newSaved }).eq('id', id);
  if (!error) { g.saved = newSaved; toast('Abono registrado'); renderGoals(); }
}

async function deleteGoal(id) {
  if (!confirm('¿Eliminar esta meta?')) return;
  await db.from('goals').delete().eq('id', id);
  allGoals = allGoals.filter(g=>g.id!==id);
  renderGoals();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab==='resumen') renderResumen();
  });
});

document.getElementById('prev-month').addEventListener('click', () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1);
  updateMonthLabel(); renderAll();
});
document.getElementById('next-month').addEventListener('click', () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1);
  updateMonthLabel(); renderAll();
});

setType('ingreso');
updateMonthLabel();
loadAll();
</script>
